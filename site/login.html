<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar / Registar — Casa da Música</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">Casa da Música</a>
    </div>
  </header>

  <main class="main">
    <div class="auth-container">

      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">Criar conta</button>
      </div>

      <!-- Login form -->
      <form class="auth-form" id="form-login" action="#">
        <h1 class="form-title">Bem-vindo de volta</h1>
        <p class="form-sub">Aceda à sua conta para gerir os seus bilhetes.</p>

        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="ana@exemplo.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="login-pass">
            Palavra-passe
            <a href="#" class="forgot-link">Esqueceu-se?</a>
          </label>
          <div class="input-wrap">
            <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pass" onclick="togglePass('login-pass')">&#128065;</button>
          </div>
        </div>

        <label class="checkbox-label">
          <input type="checkbox" />
          <span>Manter sessão iniciada</span>
        </label>

        <button type="submit" class="btn btn-primary btn-full">Entrar</button>

        <div class="divider"><span>ou</span></div>

        <button type="button" class="btn btn-social">
          <span class="social-icon">G</span>
          Continuar com Google
        </button>

        <p class="switch-hint">
          Não tem conta?
          <button type="button" class="link-btn" onclick="switchTab('register')">Criar conta gratuita</button>
        </p>
      </form>

      <!-- Register form -->
      <form class="auth-form hidden" id="form-register" action="#">
        <h1 class="form-title">Criar conta</h1>
        <p class="form-sub">Registe-se para comprar bilhetes e guardar o seu histórico.</p>

        <div class="form-row">
          <div class="form-group">
            <label for="reg-nome">Nome</label>
            <input type="text" id="reg-nome" placeholder="Ana" autocomplete="given-name" />
          </div>
          <div class="form-group">
            <label for="reg-apelido">Apelido</label>
            <input type="text" id="reg-apelido" placeholder="Ferreira" autocomplete="family-name" />
          </div>
        </div>

        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="ana@exemplo.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="reg-pass">Palavra-passe</label>
          <div class="input-wrap">
            <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
            <button type="button" class="toggle-pass" onclick="togglePass('reg-pass')">&#128065;</button>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-pass2">Confirmar palavra-passe</label>
          <div class="input-wrap">
            <input type="password" id="reg-pass2" placeholder="Repetir palavra-passe" autocomplete="new-password" />
            <button type="button" class="toggle-pass" onclick="togglePass('reg-pass2')">&#128065;</button>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-nascimento">Data de nascimento</label>
          <input type="date" id="reg-nascimento" />
        </div>

        <label class="checkbox-label">
          <input type="checkbox" required />
          <span>Li e aceito os <a href="#">Termos e Condições</a> e a <a href="#">Política de Privacidade</a></span>
        </label>

        <button type="submit" class="btn btn-primary btn-full">Criar conta</button>

        <p class="switch-hint">
          Já tem conta?
          <button type="button" class="link-btn" onclick="switchTab('login')">Entrar</button>
        </p>
      </form>

    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Casa da Música. Todos os direitos reservados.</p>
  </footer>

  <script>
    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
    }

    function togglePass(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
